<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>CoverGap — Know Your Gap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1080px;overflow:hidden;background:#fff}
body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

.post{
  width:1080px;
  height:1080px;
  background:#FFFFFF;
  position:relative;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:80px 88px;
  overflow:hidden;
}

.blob{position:absolute;border-radius:50%;pointer-events:none}
.blob-1{width:620px;height:580px;top:-200px;right:-120px;background:radial-gradient(circle,#5B21B6 0%,transparent 70%);opacity:0.07}
.blob-2{width:400px;height:400px;bottom:-100px;left:-80px;background:radial-gradient(circle,#5B21B6 0%,transparent 70%);opacity:0.05}

.top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
.logo{display:flex;align-items:center;gap:10px}
.logo-word{font-family:'DM Sans',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.03em;color:#111827}
.logo-word span{color:#5B21B6}
.tag{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#5B21B6;background:#EDE9FE;padding:6px 14px;border-radius:100px;letter-spacing:0.02em;text-transform:uppercase}

.body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:56px 0 32px}

.headline{font-family:'DM Sans',sans-serif;font-weight:800;font-size:84px;line-height:1.0;letter-spacing:-0.04em;color:#111827;margin-bottom:52px}
.headline em{font-style:normal;color:#5B21B6}

.bar-labels{display:flex;justify-content:space-between;margin-bottom:10px}
.bar-label{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.bar-label.covered{color:#5B21B6}
.bar-label.gap{color:#F43F5E}
.bar-track{height:20px;border-radius:100px;overflow:hidden;display:flex;background:#F3F4F6}
.bar-fill-covered{width:62%;background:linear-gradient(90deg,#7C3AED,#5B21B6);border-radius:100px 0 0 100px}
.bar-fill-gap{width:38%;background:linear-gradient(90deg,#F43F5E,#FB7185);border-radius:0 100px 100px 0}

.stats{display:flex;gap:80px;margin-top:28px}
.stat-num{font-family:'DM Sans',sans-serif;font-weight:800;font-size:52px;letter-spacing:-0.04em;line-height:1}
.stat-num.purple{color:#5B21B6}
.stat-num.red{color:#F43F5E}
.stat-desc{font-family:'Inter',sans-serif;font-size:15px;color:#6B7280;font-weight:400;margin-top:6px;line-height:1.4}

.bottom{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between}
.cta-pill{display:flex;align-items:center;gap:12px;background:#5B21B6;color:#fff;padding:16px 28px;border-radius:100px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.01em}
.cta-arrow{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.url{font-family:'Inter',sans-serif;font-size:16px;font-weight:500;color:#9CA3AF;letter-spacing:0.02em}
</style>
</head>
<body>
<div class="post">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="top">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="6" y1="22" x2="26" y2="22" stroke="#111827" stroke-width="7" stroke-linecap="round"/>
        <line x1="38" y1="22" x2="58" y2="22" stroke="#111827" stroke-width="7" stroke-linecap="round"/>
        <line x1="26" y1="22" x2="38" y2="22" stroke="#5B21B6" stroke-width="7" stroke-linecap="round" stroke-dasharray="4 5"/>
        <line x1="6" y1="42" x2="58" y2="42" stroke="#111827" stroke-width="7" stroke-linecap="round"/>
      </svg>
      <div class="logo-word">Cover<span>Gap</span></div>
    </div>
    <div class="tag">Free Cover Review</div>
  </div>

  <div class="body">
    <div class="headline">Most people<br>don't know their<br><em>gap</em> until<br>they claim.</div>

    <div>
      <div class="bar-labels">
        <span class="bar-label covered">Covered</span>
        <span class="bar-label gap">The Gap</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill-covered"></div>
        <div class="bar-fill-gap"></div>
      </div>
      <div class="stats">
        <div>
          <div class="stat-num purple">62%</div>
          <div class="stat-desc">average coverage<br>for NZ households</div>
        </div>
        <div>
          <div class="stat-num red">38%</div>
          <div class="stat-desc">sits in a gap —<br>unprotected &amp; unknown</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="cta-pill">
      Free 20-min review
      <div class="cta-arrow">→</div>
    </div>
    <div class="url">covergap.nz</div>
  </div>
</div>
</body>
</html>
