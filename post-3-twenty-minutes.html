<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1080"/>
<title>CoverGap — 20 Minutes</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1080px;overflow:hidden}
body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
.post{
  width:1080px;height:1080px;
  background:#1E0A3C;
  position:relative;display:flex;flex-direction:column;
  justify-content:space-between;padding:80px 88px;overflow:hidden;
}

/* Subtle glow blobs */
.blob{position:absolute;border-radius:50%;pointer-events:none}
.blob-1{width:700px;height:700px;top:-200px;right:-150px;background:radial-gradient(circle,#7C3AED 0%,transparent 65%);opacity:0.35}
.blob-2{width:500px;height:500px;bottom:-150px;left:-100px;background:radial-gradient(circle,#5B21B6 0%,transparent 65%);opacity:0.25}

/* Top */
.top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
.logo{display:flex;align-items:center;gap:10px}
.logo-word{font-family:'DM Sans',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.03em;color:#fff}
.logo-word span{color:#A78BFA}
.tag{font-size:13px;font-weight:600;color:#A78BFA;border:1.5px solid rgba(167,139,250,0.35);padding:6px 14px;border-radius:100px;letter-spacing:0.02em;text-transform:uppercase}

/* Big number hero */
.hero{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;gap:0}
.big-num{
  font-family:'DM Sans',sans-serif;font-weight:800;
  font-size:320px;line-height:0.85;letter-spacing:-0.06em;
  color:#ffffff;
}
.big-label{
  font-family:'DM Sans',sans-serif;font-weight:700;
  font-size:80px;line-height:1;letter-spacing:-0.04em;
  color:#A78BFA;margin-top:-8px;
}
.sub{
  font-family:'Inter',sans-serif;font-size:24px;font-weight:400;
  color:rgba(255,255,255,0.55);margin-top:32px;line-height:1.5;
  max-width:560px;
}
.sub strong{color:#fff;font-weight:600}

/* Bottom */
.bottom{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between}
.cta-pill{
  display:flex;align-items:center;gap:12px;
  background:#5B21B6;color:#fff;
  padding:16px 28px;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.01em;
  box-shadow:0 0 40px rgba(91,33,182,0.5);
}
.cta-arrow{width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.url{font-size:16px;font-weight:500;color:rgba(255,255,255,0.35);letter-spacing:0.02em}
</style>
</head>
<body>
<div class="post">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="top">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 64 64" fill="none">
        <line x1="6" y1="22" x2="26" y2="22" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
        <line x1="38" y1="22" x2="58" y2="22" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
        <line x1="26" y1="22" x2="38" y2="22" stroke="#A78BFA" stroke-width="7" stroke-linecap="round" stroke-dasharray="4 5"/>
        <line x1="6" y1="42" x2="58" y2="42" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
      </svg>
      <div class="logo-word">Cover<span>Gap</span></div>
    </div>
    <div class="tag">No obligation</div>
  </div>

  <div class="hero">
    <div class="big-num">20</div>
    <div class="big-label">minutes.</div>
    <div class="sub">That's all it takes to know <strong>exactly where you stand</strong> with your cover — and what it's costing you.</div>
  </div>

  <div class="bottom">
    <div class="cta-pill">Book your free review <div class="cta-arrow">→</div></div>
    <div class="url">covergap.nz</div>
  </div>
</div>
</body>
</html>
